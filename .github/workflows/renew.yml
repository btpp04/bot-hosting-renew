name: Renew Bot

on:
  workflow_dispatch: {}
  schedule:
    - cron: "30 */6 * * *"

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install requests playwright
          playwright install chromium

      - name: Proxy tunnel
        env:
          PROXY: ${{ secrets.PROXY }}
        run: |
          set -e
          if [ -z "$PROXY" ]; then
            echo "No proxy secret"
            echo "PROXY=" >> $GITHUB_ENV
            exit 0
          fi
          if [[ "$PROXY" =~ ^(socks5|http|https):// ]]; then
            echo "PROXY=$PROXY" >> $GITHUB_ENV
            exit 0
          fi
          if [[ "$PROXY" =~ ^hysteria2:// ]]; then
            echo "Setting up hy2 tunnel..."
            wget -qO sb.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.13.7/sing-box-1.13.7-linux-amd64.tar.gz
            tar -xzf sb.tar.gz
            mv sing-box-*/sing-box ./sing-box
            chmod +x ./sing-box
            STRIPPED="${PROXY#hysteria2://}"; STRIPPED="${STRIPPED%%#*}"; NO_QUERY="${STRIPPED%%\?*}"; QUERY="${STRIPPED#*\?}"
            AUTH_HOST="${NO_QUERY%@*}"; HOSTPORT="${NO_QUERY##*@}"
            PASS="${AUTH_HOST#*:}"; HOST="${HOSTPORT%:*}"; PORT="${HOSTPORT#*:}"
            PEER=$(echo "$QUERY"|tr '&' '\n'|grep '^peer='|sed 's/^peer=//'); PEER="${PEER:-www.bing.com}"
            ALPN=$(echo "$QUERY"|tr '&' '\n'|grep '^alpn='|sed 's/^alpn=//'); ALPN="${ALPN:-h3}"
            INSECURE=""; [[ "$(echo "$QUERY"|tr '&' '\n'|grep '^insecure='|sed 's/^insecure=//')" == "1" ]] && INSECURE='"insecure": true,'
            cat > config.json <<CONFEOF
            {"log":{"level":"warn"},"inbounds":[{"type":"socks","tag":"socks-in","listen":"127.0.0.1","listen_port":1080}],"outbounds":[{"type":"hysteria2","tag":"hy2-out","server":"${HOST}","server_port":${PORT},"password":"${PASS}","tls":{"enabled":true,"server_name":"${PEER}","alpn":["${ALPN}"],${INSECURE}}}]}
CONFEOF
            ./sing-box run -c config.json &
            sleep 3
            IP=$(curl -sS --socks5 127.0.0.1:1080 https://api.ipify.org 2>/dev/null || echo "tunnel_failed")
            echo "Tunnel IP: $IP"
            echo "PROXY=socks5://127.0.0.1:1080" >> $GITHUB_ENV
            exit 0
          fi
          echo "Unsupported proxy: ${PROXY:0:20}"
          echo "PROXY=" >> $GITHUB_ENV

      - name: Auto Renew
        env:
          SESSION_COOKIE: ${{ secrets.SESSION_COOKIE }}
          CAPSOLVER_API_KEY: ${{ secrets.CAPSOLVER_API_KEY }}
          PROXY: ${{ env.PROXY }}
        run: python3 renew.py --verbose
