name: Auto Renew

on:
  schedule:
    # Run every 6 hours to check if renewal is available
    - cron: "0 */6 * * *"
  workflow_dispatch:  # Manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.check.outputs.status }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Check subscription status
        id: check
        env:
          SESSION_COOKIE: ${{ secrets.SESSION_COOKIE }}
        run: |
          python3 renew.py --verbose

  renew:
    needs: check
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (full)
        run: |
          pip install requests playwright

      - name: Install Playwright browser
        run: |
          playwright install chromium

      - name: Attempt renewal
        env:
          SESSION_COOKIE: ${{ secrets.SESSION_COOKIE }}
          CAPSOLVER_API_KEY: ${{ secrets.CAPSOLVER_API_KEY }}
        run: |
          python3 renew.py --playwright --verbose
