name: BotHosting Renew
on:
  workflow_dispatch:
  schedule:
    - cron: '30 */6 * * *'
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests playwright && playwright install chromium
      - name: Proxy tunnel
        shell: bash
        env:
          PROXY: ${{ secrets.PROXY }}
        run: |
          set -e
          if [[ "$PROXY" =~ ^(socks5|http|https):// ]]; then
            echo "PROXY=$PROXY" >> $GITHUB_ENV
            exit 0
          fi
          if [[ "$PROXY" =~ ^hysteria2:// ]]; then
            echo "proxy is hy2, setting up tunnel..."
            wget -qO sb.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.13.7/sing-box-1.13.7-linux-amd64.tar.gz
            tar -xzf sb.tar.gz && mv sing-box-*/sing-box . && chmod +x ./sing-box
            S="${PROXY#hysteria2://}"; S="${S%%#*}"; NQ="${S%%\?*}"; Q="${S#*\?}"
            AH="${NQ%@*}"; HP="${NQ##*@}"; PASS="${AH#*:}"; H="${HP%:*}"; P="${HP#*:}"
            PEER=$(echo "$Q"|tr '&' '\n'|grep '^peer='|sed 's/^peer=//')
            PEER="${PEER:-www.bing.com}"
            ALPN=$(echo "$Q"|tr '&' '\n'|grep '^alpn='|sed 's/^alpn=//')
            ALPN="${ALPN:-h3}"
            INSEC=""
            [[ "$(echo "$Q"|tr '&' '\n'|grep '^insecure='|sed 's/^insecure=//')" == "1" ]] && INSEC='"insecure": true,'
            cat > config.json <<JSONEOF
            {"log":{"level":"warn"},"inbounds":[{"type":"socks","tag":"socks-in","listen":"127.0.0.1","listen_port":1080}],"outbounds":[{"type":"hysteria2","tag":"hy2-out","server":"${H}","server_port":${P},"password":"${PASS}","tls":{"enabled":true,"server_name":"${PEER}","alpn":["${ALPN}"],${INSEC}}}]}
JSONEOF
            ./sing-box run -c config.json &
            sleep 3
            IP=$(curl -sS --max-time 5 --socks5 127.0.0.1:1080 https://api.ipify.org 2>/dev/null || echo "tunnel_failed")
            echo "Tunnel IP: $IP"
            echo "PROXY=socks5://127.0.0.1:1080" >> $GITHUB_ENV
            exit 0
          fi
          echo "PROXY=" >> $GITHUB_ENV
      - run: python3 renew.py --verbose
        env:
          SESSION_COOKIE: ${{ secrets.SESSION_COOKIE }}
          CAPSOLVER_API_KEY: ${{ secrets.CAPSOLVER_API_KEY }}
          PROXY: ${{ env.PROXY }}
